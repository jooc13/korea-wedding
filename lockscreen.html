<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna &amp; Joo — Seoul, September 2026</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="lockscreen.css" />
  <link rel="stylesheet" href="monitor.css" />
</head>
<body>

  <div class="mon-wrap">

    <div class="mon-body">
      <img class="sticky-note" src="postit.png" alt="Post-it note" />

      <!-- Screen recess -->
      <div class="mon-screen-recess">
        <div class="mon-glare"></div>
        <div class="mon-content">

          <!-- Background -->
          <div class="lock-wallpaper"></div>

          <!-- XP login dialog -->
          <div class="lock-ui" id="lock-ui">
            <div class="xp-dialog">

              <!-- Title bar -->
              <div class="xp-titlebar">
                <span class="xp-title-icon">🔒</span>
                <span class="xp-title-text">Log On</span>
                <div class="xp-close-btn">✕</div>
              </div>

              <!-- Body: form only -->
              <div class="xp-body">
                <div class="xp-form">
                  <div class="xp-welcome-text">
                    Type your password to log on.
                  </div>
                  <div class="xp-field-row">
                    <label for="xp-user">User name:</label>
                    <input id="xp-user" type="text" value="Wedding Guest" autocomplete="off" />
                  </div>
                  <div class="xp-field-row">
                    <label for="xp-pass">Password:</label>
                    <input id="xp-pass" type="password" autocomplete="off" autofocus />
                  </div>
                </div>
              </div>

              <!-- Footer -->
              <div class="xp-footer">
                <div class="xp-btn-row">
                  <button class="xp-btn xp-btn-ok" id="ok-btn">OK</button>
                  <button class="xp-btn" id="cancel-btn">Cancel</button>
                </div>
              </div>

            </div>
          </div>

        </div>
      </div><!-- /.mon-screen-recess -->

      <!-- Controls strip -->
      <div class="mon-controls-strip">
        <span class="mon-brand"></span>
        <div class="mon-btn-cluster">
          <div class="mon-btn-unit">
            <span class="mon-btn-icon">▤</span>
            <button class="mon-btn" title="Menu"></button>
          </div>
          <div class="mon-btn-unit">
            <span class="mon-btn-icon">◀</span>
            <button class="mon-btn" title="Brightness −"></button>
          </div>
          <div class="mon-btn-unit">
            <span class="mon-btn-icon">▶</span>
            <button class="mon-btn" title="Brightness +"></button>
          </div>
          <div class="mon-btn-unit">
            <span class="mon-btn-icon">AUTO</span>
            <button class="mon-btn" title="Auto"></button>
          </div>
          <div class="mon-btn-unit">
            <span class="mon-btn-icon">⏻</span>
            <button class="mon-btn power" title="Power"></button>
          </div>
        </div>
        <div class="mon-led-unit">
          <div class="mon-led"></div>
          <span class="mon-led-label">ON</span>
        </div>
      </div>

    </div><!-- /.mon-body -->

    <div class="mon-neck"></div>
    <div class="mon-foot"></div>

  </div><!-- /.mon-wrap -->

  <div class="lock-bottom">Anna &amp; Joo</div>

  <script src="coffee.js"></script>
  <script>
    sessionStorage.removeItem('lock_done');

    /* ── Unlock ───────────────────────────────────────────── */
    function unlock() {
      sessionStorage.setItem('lock_done', '1');
      window.location.href = 'desktop.html';
    }
    document.getElementById('ok-btn').addEventListener('click', unlock);
    document.getElementById('xp-pass').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') unlock();
    });

    /* ── Cancel → blank screen, click anywhere → restore dialog ── */
    var lockUi      = document.getElementById('lock-ui');
    var lockContent = document.querySelector('.mon-content');

    function showBlank() {
      lockUi.style.display = 'none';
      lockContent.addEventListener('click', showDialog);
    }

    function showDialog() {
      lockContent.removeEventListener('click', showDialog);
      lockUi.style.display = 'flex';
      setTimeout(function(){ document.getElementById('xp-pass').focus(); }, 50);
    }

    document.getElementById('cancel-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      showBlank();
    });
  </script>
</body>
</html>
