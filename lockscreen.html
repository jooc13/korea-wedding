<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna &amp; Joo — Seoul, September 2026</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="lockscreen.css" />
  <link rel="stylesheet" href="monitor.css?v=5" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kalam:wght@400&display=swap" />
</head>
<body>

  <div class="mon-wrap">

    <div class="mon-body">
      <div class="sticky-note">password:<br>p$m&amp;Z#2!wQ*9%_X</div>

      <!-- Screen recess -->
      <div class="mon-screen-recess">
        <div class="mon-glare"></div>
        <div class="mon-content">

          <!-- Canvas background -->
          <canvas id="screensaver"></canvas>

          <!-- Lock UI -->
          <div class="lock-ui">
            <div class="lock-clock">
              <div class="lock-time" id="lock-time">--:-- --</div>
              <div class="lock-date" id="lock-date">---</div>
            </div>
            <div class="lock-panel">
              <div class="avatar-wrap">
                <div class="avatar-head"></div>
                <div class="avatar-shoulders"></div>
              </div>
              <div class="lock-username">Wedding Guest</div>
              <div class="lock-password-row">
                <input type="password" id="pw-input" placeholder="Password" autocomplete="off" autofocus />
                <button class="lock-enter" id="enter-btn">&#8594;</button>
              </div>
            </div>
          </div>

        </div>
      </div><!-- /.mon-screen-recess -->

      <!-- Controls strip -->
      <div class="mon-controls-strip">
        <span class="mon-brand"></span>
        <div class="mon-btn-cluster">
          <div class="mon-btn-unit">
            <span class="mon-btn-icon">▤</span>
            <button class="mon-btn" title="Menu"></button>
          </div>
          <div class="mon-btn-unit">
            <span class="mon-btn-icon">◀</span>
            <button class="mon-btn" title="Brightness −"></button>
          </div>
          <div class="mon-btn-unit">
            <span class="mon-btn-icon">▶</span>
            <button class="mon-btn" title="Brightness +"></button>
          </div>
          <div class="mon-btn-unit">
            <span class="mon-btn-icon">AUTO</span>
            <button class="mon-btn" title="Auto"></button>
          </div>
          <div class="mon-btn-unit">
            <span class="mon-btn-icon">⏻</span>
            <button class="mon-btn power" title="Power"></button>
          </div>
        </div>
        <div class="mon-led-unit">
          <div class="mon-led"></div>
          <span class="mon-led-label">ON</span>
        </div>
      </div>

    </div><!-- /.mon-body -->

    <div class="mon-neck"></div>
    <div class="mon-foot"></div>

  </div><!-- /.mon-wrap -->

  <div class="lock-bottom">Anna &amp; Joo</div>

  <script src="coffee.js?v=5"></script>
  <script>
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    function updateClock() {
      const now = new Date(), h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
      const ampm = h >= 12 ? 'PM' : 'AM', h12 = (h%12)||12;
      document.getElementById('lock-time').textContent = h12+':'+m+' '+ampm;
      document.getElementById('lock-date').textContent =
        DAYS[now.getDay()]+', '+MONTHS[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
    }
    updateClock(); setInterval(updateClock, 10000);

    /* Clear any stale token so a fresh lockscreen visit always requires unlock */
    sessionStorage.removeItem('lock_done');

    function unlock() {
      sessionStorage.setItem('lock_done','1');
      window.location.href = 'desktop.html';
    }
    document.getElementById('enter-btn').addEventListener('click', unlock);
    document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });

    // Canvas — solid white (background is CSS)
    const canvas = document.getElementById('screensaver');
    function resizeCanvas() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
  </script>
</body>
</html>
