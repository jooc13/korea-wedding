  <script>
    /* ── Clock ── */
    function updateClock() {
      const now = new Date(), h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
      const ampm = h >= 12 ? 'PM' : 'AM', h12 = (h % 12) || 12;
      const timeStr = h12 + ':' + m + ' ' + ampm;
      const days    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const months  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const dateStr = days[now.getDay()] + ' ' + months[now.getMonth()] + ' ' + now.getDate();
      const t = document.getElementById('taskbar-time');
      const d = document.getElementById('taskbar-date');
      if (t) t.textContent = timeStr;
      if (d) d.textContent = dateStr;
    }
    updateClock();
    setInterval(updateClock, 10000);

    /* ── Start menu ── */
    const startBtn  = document.getElementById('start-btn');
    const startMenu = document.getElementById('start-menu');

    startBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      const open = startMenu.classList.toggle('open');
      startBtn.classList.toggle('active', open);
    });

    document.addEventListener('click', function () {
      startMenu.classList.remove('open');
      startBtn.classList.remove('active');
    });

    startMenu.addEventListener('click', function (e) { e.stopPropagation(); });

    document.getElementById('start-shutdown').addEventListener('click', function (e) {
      e.preventDefault();
      startMenu.classList.remove('open');
      startBtn.classList.remove('active');
      sessionStorage.clear();
      window.location.replace('lockscreen.html');
    });
  </script>

  <script>
    var _toastCounter = 0;

    function showMailToast(from, subject, msgId) {
      var stack = document.getElementById('toast-stack');
      if (!stack) {
        stack = document.createElement('div');
        stack.id = 'toast-stack';
        document.querySelector('.desktop').appendChild(stack);
      }
      var toast = document.createElement('div');
      toast.className = 'mail-toast-el';
      toast.innerHTML = [
        '<div class="toast-title-bar">',
        '  <span class="toast-title-text">✉️ New Message</span>',
        '  <button class="toast-close toast-close-dyn">✕</button>',
        '</div>',
        '<div class="toast-body toast-body-dyn">',
        '  <div class="toast-icon-row">',
        '    <div class="toast-envelope">📬</div>',
        '    <div class="toast-lines">',
        '      <div class="toast-headline">You\'ve got mail!</div>',
        '      <div class="toast-meta">From: <span>' + from + '</span></div>',
        '      <div class="toast-meta">Subject: <span>' + subject + '</span></div>',
        '    </div>',
        '  </div>',
        '</div>',
      ].join('');

      stack.appendChild(toast);

      function dismiss() {
        toast.classList.add('toast-hiding');
        toast.addEventListener('animationend', function () {
          toast.remove();
          var s = document.getElementById('toast-stack');
          if (s && !s.children.length) s.remove();
        }, { once: true });
      }

      toast.querySelector('.toast-close-dyn').addEventListener('click', function (e) {
        e.stopPropagation(); dismiss();
      });

      toast.querySelector('.toast-body-dyn').addEventListener('click', function () {
        dismiss();
        /* if mail is already open and init script has run, select directly */
        if (typeof window._mailSelectMsg === 'function') {
          WM.open('mail');
          window._mailSelectMsg(msgId);
        } else {
          window._pendingMailMsg = msgId;
          WM.open('mail');
        }
      });
    }
