  <style>
    #toast-stack {
      position: absolute;
      bottom: 40px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 9999;
      pointer-events: none;
    }
    .mail-toast-el {
      width: 230px;
      background: #d4d0c8;
      box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #fff,
                  inset -2px -2px 0 #808080, inset 2px 2px 0 #dfdfdf,
                  2px 2px 4px rgba(0,0,0,.4);
      animation: toast-slide-in 0.3s ease-out both;
      cursor: default;
      user-select: none;
      pointer-events: all;
    }
    @keyframes toast-slide-in {
      from { transform: translateX(calc(100% + 32px)); }
      to   { transform: translateX(0); }
    }
    .mail-toast-el.toast-hiding {
      animation: toast-slide-out 0.25s ease-in both;
    }
    @keyframes toast-slide-out {
      from { transform: translateX(0); }
      to   { transform: translateX(calc(100% + 32px)); }
    }
    .toast-title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to right, #0a246a 0%, #3a6ea5 60%, #6da3d4 100%);
      padding: 3px 4px 3px 6px;
    }
    .toast-title-text {
      font-size: 11px;
      font-weight: bold;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 14px;
      font-size: 10px;
      font-weight: bold;
      line-height: 1;
      background: #d4d0c8;
      border: none;
      box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #fff,
                  inset -2px -2px 0 #808080, inset 2px 2px 0 #dfdfdf;
      cursor: pointer;
      flex-shrink: 0;
    }
    .toast-close:active {
      box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #fff;
    }
    .toast-body {
      padding: 8px 10px 10px;
      cursor: pointer;
    }
    .toast-icon-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .toast-envelope { font-size: 28px; line-height: 1; flex-shrink: 0; }
    .toast-lines { flex: 1; overflow: hidden; }
    .toast-headline {
      font-size: 12px;
      font-weight: bold;
      color: #000;
      margin-bottom: 4px;
    }
    .toast-meta {
      font-size: 11px;
      color: #404040;
      margin-bottom: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast-meta span { color: #000; font-weight: bold; }

    /* XP-style modal overlay */
    .xl-overlay {
      position: absolute;
      inset: 0;
      z-index: 9500;
      cursor: default;
    }
    /* XP dialog window */
    .xl-dialog {
      position: absolute;
      z-index: 9501;
      background: #d4d0c8;
      border: 1px solid #000;
      box-shadow:
        inset 1px 1px 0 #fff,
        inset -1px -1px 0 #808080,
        2px 2px 0 #000;
      display: flex;
      flex-direction: column;
      font-family: 'Tahoma', 'MS Sans Serif', Arial, sans-serif;
      font-size: 12px;
    }
    .xl-titlebar {
      background: linear-gradient(to right, #0a246a 0%, #3a6ea5 60%, #6da3d4 100%);
      padding: 3px 4px 3px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      cursor: move;
    }
    .xl-title-text {
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .xl-close-btn {
      width: 16px;
      height: 14px;
      background: #d4d0c8;
      border: none;
      cursor: pointer;
      font-size: 9px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;

    }
    .xl-close-btn:active {

        inset -1px -1px 0 #fff;
    }
    .xl-body {
      padding: 14px 16px 12px;

    .xl-msg-row {

  <script>
    /* ── Clock ── */
    function updateClock() {
      const now = new Date(), h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
      const ampm = h >= 12 ? 'PM' : 'AM', h12 = (h % 12) || 12;
      const timeStr = h12 + ':' + m + ' ' + ampm;
      const days    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const months  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const dateStr = days[now.getDay()] + ' ' + months[now.getMonth()] + ' ' + now.getDate();
      const t = document.getElementById('taskbar-time');
      const d = document.getElementById('taskbar-date');
      if (t) t.textContent = timeStr;
      if (d) d.textContent = dateStr;
    }
    updateClock();
    setInterval(updateClock, 10000);

    /* ── Start menu ── */
    const startBtn  = document.getElementById('start-btn');
    const startMenu = document.getElementById('start-menu');

    function closeStartMenu() {
      startMenu.classList.remove('open');
      startBtn.classList.remove('active');
    }

    startBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      const open = startMenu.classList.toggle('open');
      startBtn.classList.toggle('active', open);
    });

    document.addEventListener('click', closeStartMenu);

    startMenu.addEventListener('click', function (e) { e.stopPropagation(); });

    document.getElementById('start-shutdown').addEventListener('click', function (e) {
      e.preventDefault();
      closeStartMenu();
      sessionStorage.clear();
      window.location.replace('lockscreen.html');
    });
  </script>

  <script>
    var _toastCounter = 0;

    function showMailToast(from, subject, msgId) {
      var stack = document.getElementById('toast-stack');
      if (!stack) {
        stack = document.createElement('div');
        stack.id = 'toast-stack';
        document.querySelector('.desktop').appendChild(stack);
      }
      var toast = document.createElement('div');
      toast.className = 'mail-toast-el';
      toast.innerHTML = [
        '<div class="toast-title-bar">',
        '  <span class="toast-title-text">✉️ New Message</span>',
        '  <button class="toast-close toast-close-dyn">✕</button>',
        '</div>',
        '<div class="toast-body toast-body-dyn">',
        '  <div class="toast-icon-row">',
        '    <div class="toast-envelope">📬</div>',
        '    <div class="toast-lines">',
        '      <div class="toast-headline">You\'ve got mail!</div>',
        '      <div class="toast-meta">From: <span>' + from + '</span></div>',
        '      <div class="toast-meta">Subject: <span>' + subject + '</span></div>',
        '    </div>',
        '  </div>',
        '</div>',
      ].join('');

      stack.appendChild(toast);

      function dismiss() {
        toast.classList.add('toast-hiding');
        toast.addEventListener('animationend', function () {
          toast.remove();
          var s = document.getElementById('toast-stack');
          if (s && !s.children.length) s.remove();
        }, { once: true });
      }

      toast.querySelector('.toast-close-dyn').addEventListener('click', function (e) {
        e.stopPropagation(); dismiss();
      });

      toast.querySelector('.toast-body-dyn').addEventListener('click', function () {
        dismiss();
        /* only use _mailSelectMsg if the mail window is currently open in the DOM */
        if (document.getElementById('wm-mail') && typeof window._mailSelectMsg === 'function') {
          WM.open('mail');
          window._mailSelectMsg(msgId);
        } else {
          window._pendingMailMsg = msgId;
          WM.open('mail');
        }
      });
    }

  <script>
    /* ── Icon grid auto-fit — scales down on short viewports so all icons are always visible ── */
    (function () {
      function fitIconGrid() {
        var area = document.querySelector('.desktop-area');
        var grid = document.getElementById('icon-grid');
        if (!area || !grid) return;

        /* Reset scale so we measure the natural (unscaled) height */
        grid.style.transform = '';
        grid.style.transformOrigin = 'top left';

        var available = area.clientHeight - 16; /* 16px top offset */
        var natural   = grid.offsetHeight;
        if (natural <= 0 || available <= 0) return;

        var scale = Math.min(1, available / natural);
        if (scale < 0.999) {
          grid.style.transform = 'scale(' + scale.toFixed(4) + ')';
        }
      }

      document.addEventListener('DOMContentLoaded', fitIconGrid);
      window.addEventListener('resize', fitIconGrid);
    })();
  </script>

  <script>
    /* ── Excel decoy dialog helpers ─────────────────────────────── */

    var _xlDragState = null;

    function _xlMakeDraggable(dialog, titlebar) {
      titlebar.addEventListener('mousedown', function(e) {
        if (e.target.tagName === 'BUTTON') return;
        var rect = dialog.getBoundingClientRect();
        var areaRect = document.querySelector('.desktop-area').getBoundingClientRect();
        _xlDragState = {
          dialog: dialog,
          ox: e.clientX - (parseInt(dialog.style.left) || 0),
          oy: e.clientY - (parseInt(dialog.style.top) || 0)
        };
        e.preventDefault();
      });
    }

    document.addEventListener('mousemove', function(e) {
      if (!_xlDragState) return;
      var d = _xlDragState.dialog;
      var area = document.querySelector('.desktop-area');
      var nx = Math.max(0, Math.min(area.clientWidth - 40, e.clientX - _xlDragState.ox));
      var ny = Math.max(0, Math.min(area.clientHeight - 18, e.clientY - _xlDragState.oy));
      d.style.left = nx + 'px';
      d.style.top  = ny + 'px';
    });

    document.addEventListener('mouseup', function() { _xlDragState = null; });

    function _xlCenter(dialog) {
      var area = document.querySelector('.desktop-area');
      var w = dialog.offsetWidth || 300;
      var h = dialog.offsetHeight || 160;
      dialog.style.left = Math.max(20, Math.round((area.clientWidth - w) / 2)) + 'px';
      dialog.style.top  = Math.max(20, Math.round((area.clientHeight - h) / 2)) + 'px';
    }

    function _xlDismiss(overlay, dialog) {
      overlay.remove();
      dialog.remove();
    }

    function _xlErrorDialog(title, message, parentOverlay, parentDialog) {
      /* dim desktop-area again with a second overlay */
      var area = document.querySelector('.desktop-area');

      var ov2 = document.createElement('div');
      ov2.className = 'xl-overlay';
      ov2.style.zIndex = '9600';
      area.appendChild(ov2);

      var dlg = document.createElement('div');
      dlg.className = 'xl-dialog';
      dlg.style.cssText = 'position:absolute;z-index:9601;width:320px;';
      dlg.innerHTML =
        '<div class="xl-titlebar xl-tb2">' +
          '<span class="xl-title-text"><span>⛔</span>' + title + '</span>' +
          '<button type="button" class="xl-close-btn xl-err-close">✕</button>' +
        '</div>' +
        '<div class="xl-body">' +
          '<div class="xl-msg-row">' +
            '<div class="xl-icon">🚫</div>' +
            '<div class="xl-text">' + message + '</div>' +
          '</div>' +
          '<div class="xl-sep"></div>' +
          '<div class="xl-btn-row"><button type="button" class="xl-btn xl-err-ok">OK</button></div>' +
        '</div>';
      area.appendChild(dlg);

      /* center after append so offsetWidth is correct */
      requestAnimationFrame(function() { _xlCenter(dlg); });

      _xlMakeDraggable(dlg, dlg.querySelector('.xl-tb2'));

      function close2() {
        _xlDismiss(ov2, dlg);
        /* also close the parent password dialog if present */
        if (parentOverlay && parentDialog) _xlDismiss(parentOverlay, parentDialog);
      }

      dlg.querySelector('.xl-err-close').addEventListener('click', close2);
      dlg.querySelector('.xl-err-ok').addEventListener('click', close2);
      setTimeout(function() { dlg.querySelector('.xl-err-ok').focus(); }, 200);
    }

    function xlShowCountdown() {
      var area = document.querySelector('.desktop-area');

      /* Days until Sep 5 2026 in Korea Standard Time (UTC+9) */
      function daysLeft() {
        var now = new Date();
        /* current date in KST */
        var kstOffset = 9 * 60; /* minutes */
        var utc = now.getTime() + now.getTimezoneOffset() * 60000;
        var kst = new Date(utc + kstOffset * 60000);
        var kstToday = new Date(kst.getFullYear(), kst.getMonth(), kst.getDate());
        var wedding  = new Date(2026, 8, 5); /* Sep 5 2026 */
        var diff = Math.ceil((wedding - kstToday) / 86400000);
        return Math.max(0, diff);
      }

      ov.className = 'xl-overlay';
      area.appendChild(ov);
