<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Get to the Altar</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script>if (!location.search.includes('wm=1')) { window.location.replace('desktop.html?open=game'); }</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    .game-wrap { width: 100%; overflow: hidden; background: #fff; position: relative; }
    #gc { display: block; width: 100%; height: 360px; cursor: default; }

    /* Character selection screen */
    #select-screen {
      position: absolute; inset: 0;
      background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: "Courier New", monospace;
      z-index: 10;
    }
    #select-screen h1 {
      font-size: 18px; font-weight: bold;
      letter-spacing: 1px; margin-bottom: 6px;
    }
    #select-screen p {
      font-size: 12px; color: #555; margin-bottom: 28px;
    }
    .char-options {
      display: flex; gap: 32px;
    }
    .char-btn {
      font-family: "Courier New", monospace;
      font-size: 13px; font-weight: bold;
      background: #fff;
      border: 2px solid #000;
      padding: 14px 28px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.1s, color 0.1s;
    }
    .char-btn:hover { background: #000; color: #fff; }

  </style>
</head>
<body>
<div class="window-body" style="flex:1;overflow:hidden;padding:0;position:relative;">
  <div class="game-wrap">
    <canvas id="gc"></canvas>
    <div id="select-screen">
      <h1>GET TO THE ALTAR</h1>
      <p>SPACE or CLICK to balance &nbsp;·&nbsp; reach the altar</p>
      <div class="char-options">
        <button class="char-btn" id="btn-bride">BRIDE</button>
        <button class="char-btn" id="btn-groom">GROOM</button>
      </div>
    </div>
  </div>
  <script data-wm-init>
(function () {
  'use strict';

  var canvas = document.getElementById('gc');
  var ctx    = canvas.getContext('2d');

  // ── Character dimensions ─────────────────────────────────────
  var TORSO_H   = 52;
  var HEAD_R    = 12;
  var THIGH     = 36;
  var CALF      = 32;
  var UPPER_ARM = 22;
  var LOWER_ARM = 18;

  // ── Aisle ────────────────────────────────────────────────────
  var PPF       = 50;
  var FINISH_FT = 35;
  var START_X   = 160;

  // ── Layout ───────────────────────────────────────────────────
  var GROUND_Y, HIP_Y;
  function computeLayout() {
    canvas.width  = canvas.parentElement.clientWidth || 560;
    canvas.height = 360;
    GROUND_Y = canvas.height - 55;
    HIP_Y    = GROUND_Y - THIGH - CALF;   // where the hip pivot sits
  }

  // ── Physics state (inverted pendulum) ───────────────────────
  // hipX advances at constant speed; theta/omega are the lean angle
  var hipX  = START_X;
  var theta = 0;   // lean angle in radians (+ = right, - = left)
  var omega = 0;   // angular velocity

  var HIP_SPEED = 1.4;     // px per frame forward walk speed
  var G         = 0.00058; // inverted-pendulum "gravity" per frame²
  var PERTURB   = 0.00230; // random shoulder perturbation amplitude
  var DAMP      = 0.983;   // angular velocity damping per frame

  function initSim() {
    hipX  = START_X;
    theta = 0;
    omega = 0;
  }

  function stepSim() {
    hipX += HIP_SPEED;

    // Inverted pendulum: any lean is amplified by gravity
    omega += Math.sin(theta) * G;

    // Random perturbation — grows slightly with distance
    omega += (Math.random() - 0.5) * (PERTURB + Math.min(distance, 30) * 0.000008);

    // Damping
    omega *= DAMP;

    theta += omega;

    // Cooldown power recovers slowly toward 1.0 between presses
    cooldownPower = Math.min(1.0, cooldownPower + 0.005);
  }

  // ── Game state ───────────────────────────────────────────────
  var state     = 'select';
  var character = 'groom';
  var distance  = 0;
  var camX      = 0;
  var lastPressTime  = 0;
  var COOLDOWN_MS    = 450;
  var cooldownPower  = 1.0;  // diminishes with mashing, recovers over time

  // Arm animation — each arm has two lateral spring segments (upper + lower)
  // Upper segment responds to body rotation; lower segment lags behind (noodle effect)
  var lAU = 0, lAUv = 0;   // left upper arm lateral offset + velocity
  var lAL = 0, lALv = 0;   // left lower arm lateral offset + velocity
  var rAU = 0, rAUv = 0;   // right upper arm
  var rAL = 0, rALv = 0;   // right lower arm

  // ── Balance input ────────────────────────────────────────────
  function applyBalance() {
    var now = Date.now();
    if (now - lastPressTime < COOLDOWN_MS) return;
    lastPressTime = now;

    var lean = Math.min(Math.abs(theta) / 0.35, 1.0);
    var base = 0.024 * (0.12 + lean * 0.88);

    if (cooldownPower >= 0.28) {
      // Well-timed press: correction scaled by remaining power
      omega -= Math.sign(theta) * base * cooldownPower;
    } else {
      // Mashing penalty: random destabilizing kick instead of correction
      omega += (Math.random() * 2 - 1) * base * 1.2;
    }

    cooldownPower *= 0.48;  // each press roughly halves remaining power
  }

  // ── Fall / finish ────────────────────────────────────────────
  function checkFall() {
    if (Math.abs(theta) > 0.88) state = 'fallen';
  }

  function updateDistance() {
    var ft = (hipX - START_X) / PPF;
    if (ft > distance) distance = ft;
    if (distance >= FINISH_FT && state === 'playing') state = 'finished';
  }

  // ── Camera ───────────────────────────────────────────────────
  function updateCamera() {
    var target = hipX - canvas.width * 0.35;
    if (target < 0) target = 0;
    camX += (target - camX) * 0.08;
  }

  // ── Drawing ──────────────────────────────────────────────────
  function draw() {
    var W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.translate(-Math.round(camX), 0);
    drawScene(W);
    drawCharacter();
    ctx.restore();

    drawHUD(W, H);
  }

  function drawScene(W) {
    ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(camX - 200, GROUND_Y);
    ctx.lineTo(camX + W * 12, GROUND_Y);
    ctx.stroke();

    ctx.fillStyle = 'rgba(210,180,180,0.25)';
    ctx.fillRect(camX - 200, GROUND_Y - 5, W * 12 + 200, 5);

    for (var ft = 1; ft < FINISH_FT; ft += 3) {
      var gx = START_X + ft * PPF;
      drawPew(gx, true);
      drawPew(gx, false);
    }

    ctx.fillStyle = '#aaa';
    ctx.font      = '10px "Courier New", monospace';
    ctx.textAlign = 'center';
    for (var ft2 = 5; ft2 <= FINISH_FT; ft2 += 5) {
      var mx = START_X + ft2 * PPF;
      ctx.fillText(ft2 + "'", mx, GROUND_Y + 14);
      ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(mx, GROUND_Y); ctx.lineTo(mx, GROUND_Y + 5); ctx.stroke();
    }

    drawAltar(START_X + FINISH_FT * PPF);
    drawWaitingPartner(START_X + FINISH_FT * PPF);
  }

  function drawPew(gx, isLeft) {
    var pw = gx + (isLeft ? -1 : 1) * 60;
    ctx.save();
    ctx.fillStyle = '#d4c080'; ctx.strokeStyle = '#a08040'; ctx.lineWidth = 1;
    ctx.fillRect(pw - 16, GROUND_Y - 20, 32, 14);
    ctx.strokeRect(pw - 16, GROUND_Y - 20, 32, 14);
    ctx.beginPath();
    ctx.arc(pw, GROUND_Y - 30, 7, 0, Math.PI * 2);
    ctx.fillStyle = '#c8a882'; ctx.fill();
    ctx.strokeStyle = '#666'; ctx.lineWidth = 0.8; ctx.stroke();
    ctx.restore();
  }

  function drawAltar(ax) {
    var gy = GROUND_Y;
    ctx.save();
    ctx.strokeStyle = '#111'; ctx.lineWidth = 3; ctx.lineCap = 'square';
    ctx.beginPath(); ctx.moveTo(ax-28,gy); ctx.lineTo(ax-28,gy-80); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ax+28,gy); ctx.lineTo(ax+28,gy-80); ctx.stroke();
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(ax,gy-80,28,Math.PI,0,false); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ax-24,gy-44); ctx.lineTo(ax+24,gy-44); ctx.stroke();
    ctx.fillStyle='#000'; ctx.font='30px serif'; ctx.textAlign='center';
    ctx.fillText('♥', ax, gy-82);
    ctx.restore();
  }

  function drawWaitingPartner(ax) {
    var partnerChar = character === 'bride' ? 'groom' : 'bride';
    ctx.save();
    ctx.translate(ax + 55, HIP_Y);
    ctx.scale(-1, 1);  // face left toward approaching player

    ctx.strokeStyle = '#111';
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Legs (static standing)
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(-6, THIGH); ctx.lineTo(-7, THIGH+CALF);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(6, THIGH); ctx.lineTo(7, THIGH+CALF);
    ctx.stroke();

    // Torso
    ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -TORSO_H); ctx.stroke();

    // Arms hanging at sides
    var sy = -TORSO_H + 8;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-6, sy); ctx.lineTo(-12, sy+UPPER_ARM); ctx.lineTo(-14, sy+UPPER_ARM+LOWER_ARM);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(6, sy); ctx.lineTo(12, sy+UPPER_ARM); ctx.lineTo(14, sy+UPPER_ARM+LOWER_ARM);
    ctx.stroke();

    // Head
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(0, -TORSO_H-HEAD_R, HEAD_R, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.strokeStyle = '#111'; ctx.stroke();

    // Outfit
    if (partnerChar === 'bride') {
      ctx.beginPath();
      ctx.moveTo(-5,0); ctx.lineTo(-28,THIGH+CALF); ctx.lineTo(28,THIGH+CALF); ctx.lineTo(5,0);
      ctx.closePath();
      ctx.fillStyle='rgba(0,0,0,0.07)'; ctx.fill();
      ctx.strokeStyle='#888'; ctx.lineWidth=1.5; ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(4,-TORSO_H-HEAD_R*1.5);
      ctx.quadraticCurveTo(24,-TORSO_H-HEAD_R+10,12,-TORSO_H-HEAD_R+30);
      ctx.strokeStyle='#bbb'; ctx.lineWidth=1.5; ctx.stroke();
    } else {
      ctx.fillStyle='rgba(0,0,0,0.16)';
      ctx.fillRect(-7,-TORSO_H,14,TORSO_H);
      ctx.strokeStyle='#111'; ctx.lineWidth=1.2;
      ctx.strokeRect(-7,-TORSO_H,14,TORSO_H);
      ctx.beginPath();
      ctx.moveTo(-7,-TORSO_H); ctx.lineTo(0,-TORSO_H+14); ctx.lineTo(7,-TORSO_H);
      ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.stroke();
    }

    ctx.restore();
  }

  function drawCharacter() {
    // Noodle arms: two lateral spring segments per arm.
    // Upper segment chases body rotation; lower lags behind upper.
    // Both drawn as a single bezier curve so the arm bends like a noodle.
    var drive = omega * 220;
    lAUv += (-drive - lAU) * 0.08; lAUv *= 0.88; lAU += lAUv;
    rAUv += (-drive - rAU) * 0.08; rAUv *= 0.88; rAU += rAUv;
    lALv += (lAU * 1.4 - lAL) * 0.05; lALv *= 0.88; lAL += lALv;
    rALv += (rAU * 1.4 - rAL) * 0.05; rALv *= 0.88; rAL += rALv;

    // Step phase proportional to distance walked
    var step = hipX * 0.085;
    var lS   = Math.sin(step);
    var rS   = Math.sin(step + Math.PI);

    ctx.save();
    ctx.translate(hipX, HIP_Y);  // pivot at the hip
    ctx.rotate(theta);            // lean angle

    ctx.strokeStyle = '#111';
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';

    // Legs from hip downward
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(lS*10, THIGH); ctx.lineTo(lS*17, THIGH+CALF);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(rS*10, THIGH); ctx.lineTo(rS*17, THIGH+CALF);
    ctx.stroke();

    // Torso from hip upward
    ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -TORSO_H); ctx.stroke();

    // Arms: bezier from shoulder through elbow to hand — bends like a noodle
    var sy = -TORSO_H + 8;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-6, sy);
    ctx.quadraticCurveTo(-6 + lAU, sy + UPPER_ARM, -6 + lAU + lAL, sy + UPPER_ARM + LOWER_ARM);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(6, sy);
    ctx.quadraticCurveTo(6 + rAU, sy + UPPER_ARM, 6 + rAU + rAL, sy + UPPER_ARM + LOWER_ARM);
    ctx.stroke();

    // Head
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(0, -TORSO_H-HEAD_R, HEAD_R, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.strokeStyle = '#111'; ctx.stroke();

    // Outfit
    if (character === 'bride') {
      ctx.beginPath();
      ctx.moveTo(-5,0); ctx.lineTo(-28,THIGH+CALF); ctx.lineTo(28,THIGH+CALF); ctx.lineTo(5,0);
      ctx.closePath();
      ctx.fillStyle='rgba(0,0,0,0.07)'; ctx.fill();
      ctx.strokeStyle='#888'; ctx.lineWidth=1.5; ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(4,-TORSO_H-HEAD_R*1.5);
      ctx.quadraticCurveTo(24,-TORSO_H-HEAD_R+10,12,-TORSO_H-HEAD_R+30);
      ctx.strokeStyle='#bbb'; ctx.lineWidth=1.5; ctx.stroke();
    } else {
      ctx.fillStyle='rgba(0,0,0,0.16)';
      ctx.fillRect(-7,-TORSO_H,14,TORSO_H);
      ctx.strokeStyle='#111'; ctx.lineWidth=1.2;
      ctx.strokeRect(-7,-TORSO_H,14,TORSO_H);
      ctx.beginPath();
      ctx.moveTo(-7,-TORSO_H); ctx.lineTo(0,-TORSO_H+14); ctx.lineTo(7,-TORSO_H);
      ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.stroke();
    }

    ctx.restore();
  }

  function drawHUD(W, H) {
    ctx.fillStyle = '#000';
    ctx.font      = 'bold 28px Arial, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.max(0, distance).toFixed(1) + ' ft', W - 12, 36);

    if (state === 'playing' && distance < 3) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.font      = '11px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SPACE or CLICK to balance', W / 2, H - 10);
    }

    if (state === 'fallen' || state === 'finished') {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#000';
      ctx.textAlign = 'center';
      ctx.font      = 'bold 38px "Courier New", monospace';
      ctx.fillText(Math.max(0, distance).toFixed(1) + ' ft', W / 2, H / 2 - 18);
      if (state === 'finished') {
        ctx.font = 'italic 14px "Courier New", monospace';
        ctx.fillText('Congratulations.', W / 2, H / 2 + 10);
      }
      ctx.font = 'bold 12px "Courier New", monospace';
      ctx.fillText('[ R ]  try again', W / 2, H / 2 + (state === 'finished' ? 38 : 14));
    }
  }

  // ── Main loop ────────────────────────────────────────────────
  var loopStarted = false;
  function loop() {
    requestAnimationFrame(loop);

    if (state === 'playing') {
      stepSim();
      checkFall();
      updateDistance();
      updateCamera();
    }

    if (state !== 'select') draw();
  }

  // ── Start / restart ──────────────────────────────────────────
  function startGame(char) {
    character = char;
    document.getElementById('select-screen').style.display = 'none';

    computeLayout();
    initSim();
    distance = 0; camX = 0;
    lAU=0; lAUv=0; lAL=0; lALv=0; rAU=0; rAUv=0; rAL=0; rALv=0;
    lastPressTime = 0; cooldownPower = 1.0; state = 'playing';

    if (!loopStarted) { loopStarted = true; requestAnimationFrame(loop); }
  }

  function restartGame() {
    computeLayout();
    initSim();
    distance = 0; camX = 0;
    lAU=0; lAUv=0; lAL=0; lALv=0; rAU=0; rAUv=0; rAL=0; rALv=0;
    lastPressTime = 0; cooldownPower = 1.0; state = 'playing';
  }

  // ── Input ────────────────────────────────────────────────────
  document.getElementById('btn-bride').addEventListener('click', function () { startGame('bride'); });
  document.getElementById('btn-groom').addEventListener('click', function () { startGame('groom'); });

  document.addEventListener('keydown', function (e) {
    if ((e.code === 'Space' || e.key === ' ') && state === 'playing') {
      e.preventDefault(); applyBalance();
    }
    if (e.key.toLowerCase() === 'r' && (state === 'fallen' || state === 'finished')) {
      restartGame();
    }
  });

  canvas.addEventListener('click', function () {
    if (state === 'playing') applyBalance();
  });

  window.addEventListener('resize', computeLayout);
  computeLayout();
})();
  </script>
</div>
<div class="status-bar">
  <span class="status-segment">🕹️ Get to the Altar — 0.0 ft</span>
</div>
</body>
</html>
